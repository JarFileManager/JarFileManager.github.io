<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InfoHash to Magnet Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="app-heading">Infohash ➜ Magnet Converter</h1>

<form id="info2magnet">

    <label for="info-field">Enter InfoHash or Torrent URL</label>
    <input
        id="info-field"
        type="text"
        placeholder="Paste infohash or full torrent URL"
    >

    <label for="magnet-field">Magnet Link</label>
    <input id="magnet-field" type="text" readonly>

    <div class="button-row">
        <button type="button" class="copy-button" onclick="copyMagnetLink()">Copy</button>
        <button type="button" class="open-button" onclick="openMagnetLink()">Open</button>
    </div>

    <button type="submit" id="submit-btn">Convert</button>

</form>

<script>
    let currentMagnetLink = "";

    document.getElementById("info2magnet").addEventListener("submit", function (e) {
        e.preventDefault();

        const input = document.getElementById("info-field").value.trim();

        if (!input) {
            alert("Please enter an infohash or torrent URL");
            return;
        }

        const infoHash = extractInfoHash(input);

        if (!infoHash) {
            alert("No valid infohash found");
            return;
        }

        currentMagnetLink = "magnet:?xt=urn:btih:" + infoHash;
        document.getElementById("magnet-field").value = currentMagnetLink;
    });

    function extractInfoHash(input) {
        try {
            const url = new URL(input);
            const pathMatch = url.pathname.match(/[a-fA-F0-9]{40}/);
            if (pathMatch) return pathMatch[0].toLowerCase();
        } catch (e) {}

        const match = input.match(/[a-fA-F0-9]{40}/);
        return match ? match[0].toLowerCase() : null;
    }

    function copyMagnetLink() {
        if (!currentMagnetLink) {
            alert("Generate magnet link first");
            return;
        }

        navigator.clipboard.writeText(currentMagnetLink);

        const btn = document.querySelector(".copy-button");
        const originalText = btn.textContent;

        btn.textContent = "Copied!";
        btn.disabled = true;

        setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
        }, 2000);
    }

    function openMagnetLink() {
        if (!currentMagnetLink) {
            alert("Generate magnet link first");
            return;
        }
        window.open(currentMagnetLink, "_blank");
    }
</script>


</body>
</html>
